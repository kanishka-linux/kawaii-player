<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View series details, episodes, and information">
    <meta name="keywords" content="series, anime, movies, tv shows, episodes">
    <meta name="author" content="Series Browser">
    
    <title>$series_title - Series Details</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/browse.css">
    <link rel="stylesheet" href="/series_details.css">
    
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#007bff">
    <meta name="msapplication-TileColor" content="#007bff">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-spinner"></div>
    </div>
    
    <!-- Main Content -->
    <main class="main-content" id="main-content" role="main">
        <div class="container">
            
            <!-- Alert Messages -->
            <div id="alert-container" class="alert-container" role="alert" aria-live="polite"></div>
            
            <!-- Header with Back Button -->
            <div class="series-header">
                <button class="back-btn" id="back-btn" aria-label="Back to browse">
                    <span class="back-icon">←</span>
                    <span>Back to Browse</span>
                </button>
                <h1 class="header-title" id="header-title">Loading...</h1>
            </div>
            
            <!-- Series Content -->
            <div class="series-content" id="series-content">
                <!-- Loading state -->
                <div class="content-loading">
                    <div class="loading-spinner"></div>
                    <p>Loading series details...</p>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Back to Top Button -->
    <button class="back-to-top" id="back-to-top" aria-label="Back to top">
        <span class="back-to-top-icon">↑</span>
    </button>

    <!-- ============================================
     TEMPLATES for Edit Episodes feature
     ============================================ -->

    <!-- Edit-mode controls bar (shown above episodes when edit mode is on) -->
    <template id="tpl-edit-controls">
        <div class="edit-controls-bar">
            <button type="button" class="edit-control-btn js-select-all">Select All</button>
            <button type="button" class="edit-control-btn js-deselect-all">Deselect All</button>
            <button type="button" class="edit-control-btn edit-control-primary js-edit-selected" disabled>
                Edit Selected (<span class="js-selected-count">0</span>)
            </button>
        </div>
    </template>

    <!-- Episode checkbox (cloned into each episode row when entering edit mode) -->
    <template id="tpl-episode-checkbox">
        <div class="episode-checkbox-wrapper">
            <input type="checkbox" class="episode-edit-checkbox" aria-label="Select episode">
        </div>
    </template>

    <!-- Edit modal (mode picker + preview + submit) -->
    <template id="tpl-edit-episodes-modal">
        <div class="fetch-modal-overlay active" id="edit-episodes-overlay">
            <div class="fetch-modal-dialog edit-episodes-dialog">
                <div class="fetch-modal-title">✏️ Edit Episodes</div>
                <div class="fetch-modal-subtitle">
                    Editing <span class="js-episode-count">0</span> episode(s)
                </div>

                <div class="fetch-modal-form">
                    <!-- Mode: Title Only -->
                    <div class="edit-mode-option">
                        <label class="edit-mode-radio-label">
                            <input type="radio" name="edit-mode" value="title-only" class="js-mode-radio" checked>
                            <strong>Title Only</strong>
                        </label>
                        <div class="edit-mode-help">All selected episodes will get the same title.</div>
                        <div class="edit-mode-content js-mode-title-only">
                            <input type="text" class="fetch-modal-input js-title-only-input" placeholder="Enter new title">
                        </div>
                    </div>

                    <!-- Mode: Title + Episode Numbers -->
                    <div class="edit-mode-option">
                        <label class="edit-mode-radio-label">
                            <input type="radio" name="edit-mode" value="both" class="js-mode-radio">
                            <strong>Title + Episode Numbers</strong>
                        </label>
                        <div class="edit-mode-help">Each episode numbered in order (e.g. "Series - EP01", "Series - EP02").</div>
                        <div class="edit-mode-content js-mode-both" style="display: none;">
                            <label class="fetch-modal-label">Series title</label>
                            <input type="text" class="fetch-modal-input js-both-title-input" placeholder="Series name">
                            <label class="fetch-modal-label" style="margin-top: 8px;">Starting from</label>
                            <input type="number" class="fetch-modal-input js-both-start-input" value="1" min="1" style="max-width: 120px;">
                        </div>
                    </div>

                    <!-- Preview (collapsible) -->
                    <div class="edit-preview-section">
                        <button type="button" class="edit-preview-toggle js-preview-toggle">▶ Preview</button>
                        <div class="edit-preview-content js-preview-content" style="display: none;">
                            <table class="edit-preview-table">
                                <thead>
                                    <tr><th>File Path</th><th>New Name</th></tr>
                                </thead>
                                <tbody class="js-preview-rows"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="fetch-modal-buttons">
                    <button type="button" class="fetch-modal-btn fetch-modal-btn-cancel js-cancel-btn">Cancel</button>
                    <button type="button" class="fetch-modal-btn fetch-modal-btn-confirm js-confirm-btn">Update Episodes</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Change poster image modal -->
    <template id="tpl-change-poster-modal">
        <div class="fetch-modal-overlay active" id="change-poster-overlay">
            <div class="fetch-modal-dialog change-poster-dialog">
                <div class="fetch-modal-title">🖼️ Change Poster Image</div>
                <div class="fetch-modal-subtitle">
                    Update poster for <strong class="js-series-title"></strong>
                </div>

                <div class="fetch-modal-form">
                    <div class="fetch-modal-form-group">
                        <label class="fetch-modal-label">Image URL</label>
                        <input type="text" class="fetch-modal-input js-poster-url-input" 
                               placeholder="https://example.com/poster.jpg">
                        <div class="fetch-modal-help">Paste a direct URL, or browse available posters below</div>
                    </div>
                    
                    <div class="poster-browse-section">
                        <button type="button" class="fetch-modal-btn fetch-modal-btn-cancel js-browse-btn">
                            🔍 Browse Available Posters
                        </button>
                        
                        <div class="poster-grid-container js-poster-grid-container" style="display: none;">
                            <div class="poster-grid-status js-poster-grid-status">Loading...</div>
                            <div class="poster-grid js-poster-grid"></div>
                        </div>
                    </div>
                </div>

                <div class="fetch-modal-buttons">
                    <button type="button" class="fetch-modal-btn fetch-modal-btn-cancel js-cancel-btn">Cancel</button>
                    <button type="button" class="fetch-modal-btn fetch-modal-btn-confirm js-confirm-btn">Update Poster</button>
                </div>
            </div>
        </div>
    </template>
    
    <!-- Base JavaScript -->
    <script>
        // Remove loading screen when page is loaded
        window.addEventListener('load', function() {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                }, 300);
            }
        });
        
        // Back to top button
        document.addEventListener('DOMContentLoaded', function() {
            const backToTop = document.getElementById('back-to-top');
            if (backToTop) {
                window.addEventListener('scroll', function() {
                    if (window.pageYOffset > 300) {
                        backToTop.classList.add('visible');
                    } else {
                        backToTop.classList.remove('visible');
                    }
                });
                
                backToTop.addEventListener('click', function() {
                    window.scrollTo({
                        top: 0,
                        behavior: 'smooth'
                    });
                });
            }
        });
        
        // Global error handler
        window.addEventListener('error', function(e) {
            console.error('Global error:', e.error);
        });
    </script>
    
    <!-- Series Details JavaScript -->
    <script src="/series_details.js"></script>
</body>
</html>
